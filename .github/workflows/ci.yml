name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  spotless:
    name: Spotless (format check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Spotless check
        run: ./gradlew spotlessCheck --no-daemon

  build:
    name: Build & test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    needs: spotless
    strategy:
      fail-fast: false
      matrix:
        java: ["11", "17", "21"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build (compile + unit tests + shaded jar)
        run: ./gradlew build --no-daemon
      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports-jdk-${{ matrix.java }}
          path: build/reports/
          if-no-files-found: ignore
